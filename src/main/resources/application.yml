spring:
  application:
    name: wallet-api

  # Default profile: H2 in-memory (zero setup, just run)
  datasource:
    url: jdbc:h2:mem:walletdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  # Flyway owns the Postgres schema (issue #3). The default profile runs
  # against in-memory H2 for zero-setup local/unit runs; the baseline
  # migration is Postgres-specific DDL, so here Hibernate create-drop
  # builds the H2 schema and Flyway is disabled.
  flyway:
    enabled: false

  jpa:
    # Disabled (issue #5): the Open Session In View anti-pattern keeps a
    # Hibernate session open for the whole request so lazy associations
    # resolve during view rendering, hiding N+1s and holding a DB
    # connection longer than the transaction. Service methods now carry
    # explicit @Transactional boundaries instead.
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

# JWT Configuration
# APP_JWT_SECRET is required — no default. A missing value fails the
# bean construction (and the application start) by design so a deploy
# can never silently run on a known/hard-coded signing key (issue #4).
# See CONFIGURATION.md for a local-dev example.
jwt:
  secret: ${APP_JWT_SECRET}
  expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}  # 24 hours

# Wallet Configuration
wallet:
  default-currency: KES
  transfer-fee-percent: 1.0
  max-transfer-amount: 500000.00
  min-transfer-amount: 10.00

# CORS — comma-separated list of origins allowed to call the API from a browser.
# Default covers the Vite dev server. The prod profile expects
# APP_CORS_ALLOWED_ORIGINS to be supplied by the deployment environment.
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3002}

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: wallet-api

---
# PostgreSQL profile (activate with --spring.profiles.active=postgres)
# Defaults match the bundled docker-compose so `docker compose up` still works.
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/walletdb}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      # Issue #16: the default pool of 10 saturated under load (read p95
      # 1172ms at 50 VU). 40 is env-tunable for the deployed instance.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:40}

  h2:
    console:
      enabled: false

  # Flyway owns the schema (issue #3). baseline-on-migrate adopts an
  # existing pre-Flyway database: a non-empty schema with no history
  # table is baselined at version 1 (V1 skipped because it equals the
  # already-deployed schema) and V2+ are applied. A fresh database has
  # nothing to baseline, so V1 then V2 run normally.
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  jpa:
    open-in-view: false   # issue #5 — see default profile note
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# OpenTelemetry Tracing
management.tracing:
  sampling:
    probability: 1.0
  propagation:
    type: w3c

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
  service:
    name: wallet-api

---
# Production profile (activate with SPRING_PROFILES_ACTIVE=prod).
# Every connection setting is required from the environment — there are no
# fallback values, so a misconfigured deployment fails fast at startup.
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      # Issue #16 — env-tunable; default 40 (was the implicit 10).
      maximum-pool-size: ${DB_POOL_MAX_SIZE:40}

  h2:
    console:
      enabled: false

  # Flyway owns the schema (issue #3); see the postgres profile note.
  # validate fails fast at startup if the live schema has drifted from
  # the entities instead of silently altering it.
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  jpa:
    open-in-view: false   # issue #5 — see default profile note
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${APP_JWT_SECRET}

# CORS — required in prod. The deployment env file must supply at least the
# public origin of the frontend; multiple origins are comma-separated.
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}

logging:
  level:
    root: INFO
    com.wallet: INFO
    org.springframework: WARN
    org.hibernate: WARN
