name: Performance Full Suite

on:
  schedule:
    # 03:00 UTC nightly. Brings up the perf docker-compose target,
    # seeds it, then runs load + spike + workflow + stress sequentially.
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      - name: Bring up perf target
        run: docker compose -f docker-compose.perf.yml up -d --build

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/actuator/health 2>/dev/null | grep -q UP; then
              echo "API up"; break
            fi
            sleep 2
          done

      - name: Seed perf data
        run: bash performance/seed-perf-data.sh

      - name: Run load test
        run: |
          mkdir -p performance/results
          k6 run --summary-export performance/results/load.json performance/k6/load.js || true

      - name: Run spike test
        run: |
          k6 run --summary-export performance/results/spike.json performance/k6/spike.js || true

      - name: Run workflow test
        run: |
          k6 run --summary-export performance/results/workflow.json performance/k6/workflow.js || true

      - name: Run stress test
        run: |
          k6 run --summary-export performance/results/stress.json performance/k6/stress.js || true

      - name: Build summary table
        if: always()
        run: |
          {
            echo "### Nightly performance suite"
            echo ""
            echo "| Test | http_reqs | error rate | p95 (read) | p95 (write) |"
            echo "|---|---|---|---|---|"
            for kind in load spike workflow stress; do
              FILE="performance/results/${kind}.json"
              if [ -f "$FILE" ]; then
                node -e "
                  const d = require('./$FILE');
                  const m = d.metrics || {};
                  const reqs = (m.http_reqs && m.http_reqs.values && m.http_reqs.values.count) || 0;
                  const fail = (m.http_req_failed && m.http_req_failed.values && m.http_req_failed.values.rate) || 0;
                  const readP95 = (m['http_req_duration{kind:read}'] && m['http_req_duration{kind:read}'].values && m['http_req_duration{kind:read}'].values['p(95)']) || 0;
                  const writeP95 = (m['http_req_duration{kind:write}'] && m['http_req_duration{kind:write}'].values && m['http_req_duration{kind:write}'].values['p(95)']) || 0;
                  console.log('| ${kind} | ' + reqs + ' | ' + (fail*100).toFixed(2) + '% | ' + readP95.toFixed(0) + ' ms | ' + writeP95.toFixed(0) + ' ms |');
                "
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full-suite results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-full-suite-results
          path: performance/results/
          retention-days: 30

      - name: Tear down perf target
        if: always()
        run: docker compose -f docker-compose.perf.yml down -v
