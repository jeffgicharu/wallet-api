name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Branch on jeffgicharu/wallet-app to fetch the consumer pact from. Defaults
  # to main once the consumer PR is merged; flip to the feature branch while
  # the consumer PR is still in draft.
  PACT_BRANCH: main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build, test, and generate coverage
        run: mvn verify -B

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Build Docker image
        run: docker build -t wallet-api:${{ github.sha }} .

  pact-provider-verification:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Fetch consumer pact
        run: |
          mkdir -p pacts
          PACT_URL="https://raw.githubusercontent.com/jeffgicharu/wallet-app/${PACT_BRANCH}/pacts/wallet-app-wallet-api.json"
          echo "Fetching $PACT_URL"
          curl -fL --retry 3 -o pacts/wallet-app-wallet-api.json "$PACT_URL"
          echo "Pact file size: $(wc -c < pacts/wallet-app-wallet-api.json) bytes"

      - name: Run provider verification
        id: pact_verify
        run: |
          mvn test -Dtest=WalletApiProviderPactTest -DfailIfNoTests=false -B \
            | tee verification.log
          # Surface the verified-interaction count to the summary
          INTERACTIONS=$(jq '.interactions | length' pacts/wallet-app-wallet-api.json)
          echo "interactions=$INTERACTIONS" >> "$GITHUB_OUTPUT"

      - name: Summarise verification result
        if: success()
        run: |
          echo "### Pact provider verification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**${{ steps.pact_verify.outputs.interactions }} of ${{ steps.pact_verify.outputs.interactions }} interactions verified** against the consumer pact at branch \`$PACT_BRANCH\`." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pact-provider-verification
          path: |
            verification.log
            target/surefire-reports/
          retention-days: 30

  pit-mutation:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run PIT mutation analysis
        run: mvn test-compile org.pitest:pitest-maven:mutationCoverage -B

      - name: Summarise mutation result
        if: always()
        run: |
          if [ -f target/pit-reports/mutations.xml ]; then
            python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          tree = ET.parse('target/pit-reports/mutations.xml')
          mutants = tree.findall('mutation')
          killed = [m for m in mutants if m.get('status') == 'KILLED']
          survived = [m for m in mutants if m.get('status') == 'SURVIVED']
          no_cov = [m for m in mutants if m.get('status') == 'NO_COVERAGE']
          total = len(mutants)
          score = round(100 * len(killed) / total) if total else 0
          print('### PIT mutation analysis')
          print('')
          print(f'| Killed | Survived | No coverage | Total | Score |')
          print(f'|---|---|---|---|---|')
          print(f'| {len(killed)} | {len(survived)} | {len(no_cov)} | {total} | **{score} %** |')
          PY
          fi

      - name: Upload PIT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-mutation-report
          path: target/pit-reports/
          retention-days: 30

  perf-smoke:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      - name: Bring up perf target
        run: docker compose -f docker-compose.perf.yml up -d --build

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/actuator/health 2>/dev/null | grep -q UP; then
              echo "API up after ${i} attempts"; break
            fi
            sleep 2
          done

      - name: Seed perf data (smoke uses one seeded user)
        run: bash performance/seed-perf-data.sh
        env:
          USER_COUNT: 50      # Smoke only needs a handful; speeds CI up
          TRANSFER_COUNT: 100

      - name: Run k6 smoke test
        run: |
          mkdir -p performance/results
          k6 run --summary-export performance/results/smoke.json performance/k6/smoke.js

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-results
          path: performance/results/
          retention-days: 14

      - name: Tear down perf target
        if: always()
        run: docker compose -f docker-compose.perf.yml down -v

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check -B \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=owasp-suppressions.xml

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 14

  sonarcloud:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar -B \
            -Dsonar.projectKey=jeffgicharu_wallet-api \
            -Dsonar.organization=jeffgicharu \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN || echo "SonarCloud analysis skipped (no token configured)"
