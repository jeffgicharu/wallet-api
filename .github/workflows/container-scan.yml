name: Container & filesystem scan (Trivy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily 02:00 UTC. CVE database updates daily so a scheduled run keeps
    # the Security tab fresh even with no PR activity.
    - cron: '0 2 * * *'

jobs:
  trivy-fs:
    name: Filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          # Baseline is clean after the Boot 3.5.14 dependency upgrade
          # (issue #22): any new HIGH/CRITICAL filesystem finding now
          # blocks the merge. limit-severities-for-sarif makes the
          # exit-code honour the severity filter — without it the SARIF
          # formatter reports every severity and exit-code:1 trips on
          # MEDIUM/LOW noise too.
          limit-severities-for-sarif: true
          exit-code: '1'

      - name: Upload Trivy fs SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'

  trivy-image:
    name: Container image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build wallet-api image
        run: docker build -t wallet-api:scan .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'wallet-api:scan'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-image.sarif'
          # Clean after the Boot 3.5.14 upgrade (issue #22) — new
          # HIGH/CRITICAL image findings now block the merge. See the
          # filesystem step for why limit-severities-for-sarif is set.
          limit-severities-for-sarif: true
          exit-code: '1'

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image'
