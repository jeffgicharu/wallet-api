name: Container & filesystem scan (Trivy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily 02:00 UTC. CVE database updates daily so a scheduled run keeps
    # the Security tab fresh even with no PR activity.
    - cron: '0 2 * * *'

jobs:
  trivy-fs:
    name: Filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          # Scan-and-report only on first introduction; baseline HIGH/CRITICAL
          # findings in existing deps are tracked separately in the backlog
          # for the upcoming fix sweep. Will be flipped to exit-code 1 once
          # the baseline is clean so new findings start blocking merges.
          exit-code: '0'

      - name: Upload Trivy fs SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'

  trivy-image:
    name: Container image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build wallet-api image
        run: docker build -t wallet-api:scan .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'wallet-api:scan'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-image.sarif'
          exit-code: '0'

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image'
