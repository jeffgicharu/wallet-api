name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Sunday 06:00 UTC. CodeQL updates its queries regularly so a
    # scheduled run catches issues that newer query versions detect even
    # when the code hasn't changed.
    - cron: '0 6 * * 0'

jobs:
  analyze:
    name: Analyze Java
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: +security-and-quality

      - name: Build Java source for analysis
        run: mvn -B -DskipTests compile

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
          # Block on any error-severity finding. SARIF is uploaded to the
          # GitHub Security tab regardless of severity.
          fail-on: error
