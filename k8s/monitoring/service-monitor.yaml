apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: wallet-api
  labels:
    app: wallet-api
    release: prometheus
spec:
  selector:
    matchLabels:
      app: wallet-api
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
  namespaceSelector:
    matchNames:
      - default
