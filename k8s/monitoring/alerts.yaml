apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: wallet-api-alerts
  labels:
    release: prometheus
spec:
  groups:
    - name: wallet-api.rules
      rules:
        - alert: HighErrorRate
          expr: rate(http_server_requests_seconds_count{application="wallet-api",status=~"5.."}[5m]) > 0.1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High 5xx error rate on wallet-api"
        - alert: HighLatency
          expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{application="wallet-api"}[5m])) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "P95 latency above 2s on wallet-api"
        - alert: ServiceDown
          expr: up{job="wallet-api"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "wallet-api is down"
