services:
  wallet-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/walletdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # Local-only signing secret. APP_JWT_SECRET no longer has a
      # hard-coded fallback (issue #4); this value is for the local
      # docker-compose stack only — never a deploy secret.
      APP_JWT_SECRET: ${APP_JWT_SECRET:-local-compose-jwt-secret-not-for-deploy-deadbeef-cafe-0123456789}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wallet-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: walletdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wallet-net

volumes:
  pgdata:

networks:
  wallet-net:
